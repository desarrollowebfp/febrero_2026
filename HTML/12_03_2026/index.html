<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Esta es una aplicación para probar diferentes etiquetas semánticas"
    />
    <title>Document</title>
  </head>
  <body>
    <header>
      <h1>Medio Digital - Noticias</h1>
      <nav>
        <ul>
          <li>
            <a href="/actualidad">Actualidad</a>
          </li>
          <li>
            <a href="/local">Local</a>
          </li>
          <li>
            <a href="/deportes">Deportes</a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section>
        <h2>Actualidad</h2>
        <article>
          <h3>Copa del Rey de Europa</h3>
        </article>
        <article>
          <h3>Ganadora de el campeonato de Alemania</h3>
        </article>
      </section>
      <section>
        <h2>Local</h2>
        <img src="./assets/maxresdefault.jpg" />
      </section>
      <section>
        <h2>Deportes</h2>
        <iframe
          width="560"
          height="315"
          src="https://www.youtube.com/embed/tcwnSCfnmPM?si=FMDW5o1CQ4-XsuyU"
          title="YouTube video player"
          frameborder="0"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
            web-share;
          "
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
        ></iframe>
      </section>
    </main>
    <form>
      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre"/>
      <label for="color">Color:</label>
      <input type="color" id="color"/>
      <input type="number" />
      <input type="radio" />
      <input type="checkbox" />
      <input type="date" />
      <select>
        <option value="verano">Verano</option>
        <option>Otoño</option>
      </select>
      <button>Registro</button>
    </form>
  </body>
</html>
